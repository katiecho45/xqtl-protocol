# Model Configuration for xQTL Training Pipeline
# All model parameters and training configuration

# CatBoost Model Parameters (currently hardcoded around lines 307-326)
catboost_params:
  # Standard/Original parameters
  standard:
    depth: 6
    iterations: 1000
    learning_rate: 0.03
    l2_leaf_reg: 3.0
    min_data_in_leaf: 10
    verbose: true
  
  # Conservative parameters (to reduce overfitting)
  conservative:
    depth: 5
    iterations: 1000
    learning_rate: 0.03
    l2_leaf_reg: 5.0
    min_data_in_leaf: 10
    bagging_temperature: 1.0
    leaf_estimation_method: "Newton"
    leaf_estimation_iterations: 10
    verbose: true

# Feature weighting configuration
feature_weights:
  # Default weight for all features
  default_weight: 1.0
  
  # Weight for high-priority biology-informed features
  high_weight_value: 10.0
  
  # Patterns to identify high-priority features
  high_priority_patterns:
    - "chrombpnet_positive"
    - "tf_positive"
    - "diff"

# Model variants to train (explains the 1, 3, 5, 7 numbering your professor questioned)
model_variants:
  model_1:
    name: "Standard-Subset"
    description: "Standard data, subset features, original params"
    params: "standard"
    use_feature_weights: false
    
  model_3:
    name: "Standard-Subset-Conservative" 
    description: "Standard data, subset features, conservative params"
    params: "conservative"
    use_feature_weights: false
    
  model_5:
    name: "Standard-Subset-Weighted"
    description: "Standard data, subset features, original params with feature weighting"
    params: "standard"
    use_feature_weights: true
    
  model_7:
    name: "Standard-Subset-Conservative-Weighted"
    description: "Standard data, subset features, conservative params with feature weighting"
    params: "conservative"
    use_feature_weights: true

# Training configuration
training:
  # Random seeds for reproducibility
  random_seed: 9448
  torch_seed: 9448
  numpy_seed: 9448
  
  # Evaluation metrics to calculate
  metrics: ["average_precision_score", "roc_auc_score"]
  
  # Output file naming
  output_patterns:
    model_file: "model_{variant_name}_chr_{chromosome}_NPR_{npr}.joblib"
    summary_file: "summary_dict_catboost_4models_chr_{chromosome}_NPR_{npr}.pkl"
    feature_importance_file: "features_importance_4models_chr_{chromosome}_NPR_{npr}.csv"
    predictions_file: "predictions_4models_chr{chromosome}.tsv"
    feature_weights_file: "feature_weights_chr_{chromosome}_NPR_{npr}.pkl"
    subset_columns_file: "subset_columns_chr_{chromosome}_NPR_{npr}.pkl"